name: CI — Quality & Security

on:
  push:
    branches: ['**']       # Run on every branch push
  pull_request:
    branches: ['**']       # Run on every PR

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true  # Cancel redundant runs on the same branch

jobs:
  quality:
    name: Lint · Type Check · Build · Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js setup with dependency caching ─────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install exact versions from lock file ──────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. TypeScript type check (catches type errors before build) ─
      - name: TypeScript type check
        run: npm run type-check

      # ── 5. ESLint (security rules + style rules) ──────────────────
      - name: ESLint
        run: npm run lint

      # ── 6. Build (catches runtime errors, missing env stubs) ──────
      - name: Build
        run: npm run build
        env:
          # Use placeholder values — we only need the build to succeed
          # Real secrets are NOT needed here; they're injected at deploy time
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: https://zoikosocial.com

      # ── 7. Dependency security audit ──────────────────────────────
      - name: NPM security audit
        run: npm audit --audit-level=moderate
        # Allow the job to continue if only devDependency vulnerabilities
        continue-on-error: false

      # ── 8. Secret scanning — prevent accidental commits of API keys ─
      - name: Scan for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # Only scan commits introduced by this branch
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      # ── 9. Dependency license check ───────────────────────────────
      - name: Check dependency licenses
        run: |
          npx license-checker --onlyAllow \
            'MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;CC0-1.0;Unlicense' \
            --excludePrivatePackages

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run tests
        run: npm run test:ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
