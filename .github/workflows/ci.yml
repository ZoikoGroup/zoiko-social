name: CI — Quality & Security

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Type Check · Build · Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      # fetch-depth: 0 required so TruffleHog can diff against the base branch
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Setup pnpm ────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # ── 3. Setup Node.js with pnpm cache ─────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # ── 4. Install dependencies (exact lock file) ─────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 4b. Generate Prisma client (typed models for type check) ──
      - name: Generate Prisma client
        run: pnpm --filter @zoiko/api exec prisma generate

      # ── 5. TypeScript type check across all apps & packages ───────
      - name: TypeScript type check
        run: pnpm turbo type-check
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # ── 6. ESLint across all apps & packages ─────────────────────
      - name: ESLint
        run: pnpm turbo lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # ── 7. Build all apps (catches missing env stubs etc.) ────────
      - name: Build
        run: pnpm turbo build
        env:
          # Placeholder values — real secrets injected at deploy time
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_APP_URL: https://zoikosocial.com
          NEXT_PUBLIC_API_URL: https://api.zoikosocial.com
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # ── 8. Security audit ─────────────────────────────────────────
      - name: Security audit
        run: pnpm audit --audit-level=moderate

      # ── 9. Secret scanning (blocks accidental API key commits) ────
      # Pinned to v3 (stable); fetch-depth:0 above ensures main is locally
      # available so git log main...HEAD works in both push and PR events.
      - name: Scan for secrets
        uses: trufflesecurity/trufflehog@v3.95.7
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Scan for secrets (Push)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@v3.95.7
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --only-verified

      # ── 10. License check ─────────────────────────────────────────
      - name: Check dependency licenses
        run: |
          pnpm dlx license-checker --onlyAllow \
            'MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;CC0-1.0;Unlicense;Python-2.0;BlueOak-1.0.0' \
            --excludePrivatePackages

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm turbo test:ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
