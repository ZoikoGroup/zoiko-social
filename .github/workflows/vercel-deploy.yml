name: Deploy to Vercel

# ─────────────────────────────────────────────────────────────────────────────
# SETUP INSTRUCTIONS (one-time, done by project owner):
#
# 1. DISABLE Vercel Git Integration:
#    Vercel Dashboard → Project → Settings → Git → Disconnect repository
#    This ensures ONLY this GitHub Action deploys to Vercel (no concurrent builds).
#
# 2. Install Vercel CLI locally and link the project:
#    npm i -g vercel
#    vercel link   ← run in project root, login with project owner account
#    This creates .vercel/project.json with VERCEL_ORG_ID and VERCEL_PROJECT_ID
#    NOTE: .vercel/ is in .gitignore — do NOT commit it.
#
# 3. Add these GitHub Repository Secrets (Settings → Secrets → Actions):
#    VERCEL_TOKEN          ← from vercel.com/account/tokens
#    VERCEL_ORG_ID         ← from .vercel/project.json → "orgId"
#    VERCEL_PROJECT_ID     ← from .vercel/project.json → "projectId"
#    NEXT_PUBLIC_SUPABASE_URL         ← your Supabase project URL
#    NEXT_PUBLIC_SUPABASE_ANON_KEY    ← your Supabase anon key
#    SUPABASE_SERVICE_ROLE_KEY        ← your Supabase service role key (never expose publicly)
#
# 4. Push to main → production deploy
#    Open a PR → preview deploy (unique URL posted as PR comment)
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main        # Production deploy on push to main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened    # Preview deploy on every PR update

concurrency:
  # One deploy per branch at a time — cancels redundant preview deploys
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: ${{ github.ref == 'refs/heads/main' && 'Production Deploy' || 'Preview Deploy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Only run after CI checks pass
    # Reference the ci.yml workflow using a workflow call if you want strict gating,
    # or duplicate key checks below for self-contained safety.

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js setup ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── 3. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Quick lint + type check before deploying ───────────────
      #    Catches issues before wasting a Vercel build slot
      - name: TypeScript check
        run: npm run type-check

      - name: Lint check
        run: npm run lint

      # ── 5. Install Vercel CLI ─────────────────────────────────────
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # ── 6. Pull Vercel project config and environment variables ───
      - name: Pull Vercel environment
        run: |
          vercel pull --yes \
            --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 7. Build with Vercel (uses Vercel's build system) ─────────
      - name: Build project
        run: |
          vercel build \
            ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 8a. Deploy to PRODUCTION (main branch only) ───────────────
      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        id: deploy-prod
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to production: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 8b. Deploy PREVIEW (PR branches) ─────────────────────────
      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        id: deploy-preview
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 9. Post preview URL as a PR comment ───────────────────────
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy-preview.outputs.url }}';
            const branch = '${{ github.head_ref }}';
            const sha = '${{ github.event.pull_request.head.sha }}'.substring(0, 7);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '### Preview Deployment Ready',
                '',
                `**Branch:** \`${branch}\``,
                `**Commit:** \`${sha}\``,
                `**URL:** ${url}`,
                '',
                '> This preview was deployed via GitHub Actions. CI checks passed.',
              ].join('\n'),
            });
