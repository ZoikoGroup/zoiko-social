name: Deploy Web → Vercel

# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP (project owner):
#
# 1. Disable Vercel Git Integration:
#    Vercel Dashboard → Project (zoiko-web) → Settings → Git → Disconnect
#    This ensures ONLY this workflow deploys — no concurrent builds on free plan.
#
# 2. Add GitHub Secrets (Settings → Secrets → Actions):
#    VERCEL_TOKEN          ← vercel.com/account/tokens (must have team access)
#    VERCEL_ORG_ID         ← team_IBqKBoYLepJjJ7vkBSMYeO9e
#    VERCEL_PROJECT_ID     ← prj_Qqy5OeK0qUYnbkNcShmDx9CCSpLl
#
# 3. Add Vercel Environment Variables in Vercel Dashboard:
#    NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
#    NEXT_PUBLIC_APP_URL, NEXT_PUBLIC_API_URL
#
# Build strategy: vercel pull/build/deploy use --cwd apps/web.
# A symlink is pre-created at apps/web/apps/web/.next → apps/web/.next to
# work around a Next.js 16.2 bug where file-tracing computes the wrong path:
#   path.join(CWD=apps/web, relative(outputFileTracingRoot=root, .next))
#   = path.join(apps/web, 'apps/web/.next') = apps/web/apps/web/.next (ENOENT)
# The symlink makes that doubled path resolve to the real .next directory.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: ${{ github.ref == 'refs/heads/main' && 'Production Deploy' || 'Preview Deploy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup pnpm ────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # ── 3. Setup Node.js ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # ── 4. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Quick gate: type check + lint before wasting a Vercel slot
      - name: Type check (web only)
        run: pnpm turbo type-check --filter=@zoiko/web...
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Lint (web only)
        run: pnpm turbo lint --filter=@zoiko/web...
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # ── 6. Install Vercel CLI ─────────────────────────────────────
      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      # ── 7. Pull Vercel project config & env vars ──────────────────
      # .vercel/ is gitignored; vercel pull creates apps/web/.vercel/project.json
      # using the VERCEL_PROJECT_ID / VERCEL_ORG_ID env vars.
      - name: Pull Vercel environment
        run: |
          vercel pull --yes \
            --cwd apps/web \
            --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Null out rootDirectory so vercel build uses apps/web as project root,
      # not any stale src/app value from the Vercel dashboard.
      - name: Fix Vercel rootDirectory (monorepo safety patch)
        run: |
          node -e "
            const fs = require('fs');
            const p = 'apps/web/.vercel/project.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            console.log('rootDirectory before patch:', j.settings?.rootDirectory);
            if (j.settings) j.settings.rootDirectory = null;
            fs.writeFileSync(p, JSON.stringify(j, null, 2));
            console.log('rootDirectory after patch: null');
          "

      # ── 8. Build via Vercel ───────────────────────────────────────
      # The symlink workaround for the Next.js 16.2 path-tracing bug is inside
      # vercel.json buildCommand (runs before pnpm turbo build so it exists
      # when next build does its internal lstat).
      - name: Build
        run: |
          vercel build \
            --cwd apps/web \
            ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # ── 9a. Production deploy (main branch) ───────────────────────
      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        id: deploy-prod
        run: |
          URL=$(vercel deploy --prebuilt --prod \
            --cwd apps/web \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 9b. Preview deploy (PR branches) ─────────────────────────
      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        id: deploy-preview
        run: |
          URL=$(vercel deploy --prebuilt \
            --cwd apps/web \
            --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 10. Post preview URL on PR ────────────────────────────────
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy-preview.outputs.url }}';
            const branch = '${{ github.head_ref }}';
            const sha = '${{ github.event.pull_request.head.sha }}'.substring(0, 7);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '### Preview Deployment Ready',
                '',
                `**Branch:** \`${branch}\``,
                `**Commit:** \`${sha}\``,
                `**URL:** ${url}`,
                '',
                '> Deployed via GitHub Actions · CI checks passed.',
              ].join('\n'),
            });
