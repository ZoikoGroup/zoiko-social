name: Deploy Web → Vercel

# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP (project owner):
#
# 1. Disable Vercel Git Integration:
#    Vercel Dashboard → Project (zoiko-web) → Settings → Git → Disconnect
#    This ensures ONLY this workflow deploys — no concurrent builds on free plan.
#
# 2. Link Vercel project locally:
#    pnpm add -g vercel
#    cd apps/web && vercel link
#    Note the orgId + projectId from .vercel/project.json
#
# 3. Add GitHub Secrets (Settings → Secrets → Actions):
#    VERCEL_TOKEN          ← vercel.com/account/tokens
#    VERCEL_ORG_ID         ← from .vercel/project.json → "orgId"
#    VERCEL_PROJECT_ID     ← from .vercel/project.json → "projectId"
#
# 4. Add Vercel Environment Variables in Vercel Dashboard:
#    NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
#    NEXT_PUBLIC_APP_URL, NEXT_PUBLIC_API_URL
#
# 5. Optional — Turbo remote cache (speeds up CI):
#    TURBO_TOKEN, TURBO_TEAM
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: ${{ github.ref == 'refs/heads/main' && 'Production Deploy' || 'Preview Deploy' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup pnpm ────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # ── 3. Setup Node.js ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # ── 4. Install dependencies ───────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 5. Quick gate: type check + lint before wasting a Vercel slot
      - name: Type check (web only)
        run: pnpm turbo type-check --filter=@zoiko/web...
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Lint (web only)
        run: pnpm turbo lint --filter=@zoiko/web...
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # ── 6. Install Vercel CLI ─────────────────────────────────────
      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      # ── 7. Pull Vercel project config & env vars ──────────────────
      - name: Pull Vercel environment
        run: |
          vercel pull --yes \
            --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 8. Build via Vercel (outputs .vercel/output) ──────────────
      - name: Build
        run: |
          vercel build \
            ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} \
            --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # ── 9a. Production deploy (main branch) ───────────────────────
      - name: Deploy to Vercel (Production)
        if: github.ref == 'refs/heads/main'
        id: deploy-prod
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 9b. Preview deploy (PR branches) ─────────────────────────
      - name: Deploy to Vercel (Preview)
        if: github.event_name == 'pull_request'
        id: deploy-preview
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Preview: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # ── 10. Post preview URL on PR ────────────────────────────────
      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy-preview.outputs.url }}';
            const branch = '${{ github.head_ref }}';
            const sha = '${{ github.event.pull_request.head.sha }}'.substring(0, 7);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '### Preview Deployment Ready',
                '',
                `**Branch:** \`${branch}\``,
                `**Commit:** \`${sha}\``,
                `**URL:** ${url}`,
                '',
                '> Deployed via GitHub Actions · CI checks passed.',
              ].join('\n'),
            });
