name: Deploy API → Render

# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP (project owner):
#
# 1. Set up GitHub Container Registry access:
#    The GITHUB_TOKEN can push packages to ghcr.io automatically.
#    Image will be at: ghcr.io/zoikogroup/zoiko-social/zoiko-api
#
# 2. Update Render Service:
#    Render Dashboard → zoiko-api → Settings
#    - Environment: Existing Image (not Docker)
#    - Image URL: ghcr.io/zoikogroup/zoiko-social/zoiko-api:latest
#      (MUST match what this workflow pushes — a stale path here means Render
#       keeps redeploying an old frozen image while this workflow stays green)
#    - Auto-deploy: OFF (this workflow triggers deploy via hook)
#
# 3. Copy the Deploy Hook URL from:
#    Render Dashboard → Service → Settings → Deploy Hook
#
# 4. Add GitHub Secret:
#    RENDER_DEPLOY_HOOK_URL  ← the deploy hook URL from Render
#
# 5. Add environment variables in Render Dashboard:
#    PORT, NODE_ENV, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
#    REDIS_URL, LIVEKIT_*, R2_*, STRIPE_*, RESEND_*, SENTRY_DSN, etc.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.api'
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup pnpm ────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # ── 3. Setup Node.js ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # ── 4. Install & type check (gate before building image) ──────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @zoiko/api exec prisma generate

      - name: Type check (api only)
        run: pnpm turbo type-check --filter=@zoiko/api...
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Lint (api only)
        run: pnpm turbo lint --filter=@zoiko/api...
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # ── 5. Build & push Docker image to GitHub Container Registry ─
      - name: Lowercase registry path
        id: reg
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}/zoiko-api" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ steps.reg.outputs.image }}:latest
            ${{ steps.reg.outputs.image }}:${{ github.sha }}

      # ── 6. Trigger Render deploy via webhook ──────────────────────
      # Render pulls from ghcr.io/zoikogroup/zoiko-social/zoiko-api:latest
      # (public repo → public ghcr.io package — no auth needed)
      - name: Trigger Render deploy
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deploy triggered"

      # ── 7. Verify production actually went live ────────────────────────────
      # Render rolls back silently when a deploy fails (and a stale Image URL
      # makes every "deploy" redeploy old bits) — GitHub can't see either.
      # Poll the version endpoint until prod serves THIS commit, or fail red.
      - name: Verify production is running this build
        run: |
          # Probe the Render service directly. The apex custom domain
          # api.zoikosocial.com is currently suspended (503), so verifying against
          # it could never pass; zoiko-social-wmjc.onrender.com is the live API.
          echo "Waiting for zoiko-social-wmjc.onrender.com to serve build ${GITHUB_SHA}…"
          body=""
          for i in $(seq 1 48); do
            body=$(curl -fsS -m 10 "https://zoiko-social-wmjc.onrender.com/api/v1/health/version" 2>/dev/null || true)
            if echo "$body" | grep -q "${GITHUB_SHA}"; then
              echo "✅ Production is live on ${GITHUB_SHA}"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Production never picked up ${GITHUB_SHA} after 12 minutes."
          echo "::error::Version endpoint returned: ${body:-<no response — old build without /health/version>}"
          echo "::error::Check Render Dashboard → zoiko-api → Events for a failed deploy, and Settings → Image URL (must be ghcr.io/zoikogroup/zoiko-social/zoiko-api:latest)."
          exit 1
