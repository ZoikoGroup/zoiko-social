name: Deploy API → Render

# ─────────────────────────────────────────────────────────────────────────────
# ONE-TIME SETUP (project owner):
#
# 1. Set up GitHub Container Registry access:
#    The GITHUB_TOKEN can push packages to ghcr.io automatically.
#    Image will be at: ghcr.io/zoikosocial/zoiko-api
#
# 2. Update Render Service:
#    Render Dashboard → zoiko-api → Settings
#    - Environment: Existing Image (not Docker)
#    - Image URL: ghcr.io/zoikosocial/zoiko-api:latest
#    - Auto-deploy: OFF (this workflow triggers deploy via hook)
#
# 3. Copy the Deploy Hook URL from:
#    Render Dashboard → Service → Settings → Deploy Hook
#
# 4. Add GitHub Secret:
#    RENDER_DEPLOY_HOOK_URL  ← the deploy hook URL from Render
#
# 5. Add environment variables in Render Dashboard:
#    PORT, NODE_ENV, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY,
#    REDIS_URL, LIVEKIT_*, R2_*, STRIPE_*, RESEND_*, SENTRY_DSN, etc.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.api'
      - 'apps/api/**'
      - 'packages/**'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy API to Render
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup pnpm ────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # ── 3. Setup Node.js ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      # ── 4. Install & type check (gate before building image) ──────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (api only)
        run: pnpm turbo type-check --filter=@zoiko/api...
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Lint (api only)
        run: pnpm turbo lint --filter=@zoiko/api...
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # ── 5. Build & push Docker image to GitHub Container Registry ─
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/zoiko-api:latest
            ghcr.io/${{ github.repository }}/zoiko-api:${{ github.sha }}

      # ── 6. Trigger Render deploy via webhook ──────────────────────
      # Render pulls from ghcr.io/ZoikoGroup/zoiko-social/zoiko-api:latest
      # (public repo → public ghcr.io package — no auth needed)
      - name: Trigger Render deploy
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          echo "Render deploy triggered"
